<div class="card" id="environment-tabs">
  <div class="card-header">
    <ul class="nav nav-tabs card-header-tabs">
      <li class="nav-item">
        <a
          class="nav-link active"
          id="environments-tab"
          data-toggle="tab"
          href="#environments"
          role="tab"
          aria-controls="environments"
          aria-selected="true"
        >
          Running Environments
        </a>
      </li>
       <li class="nav-item">
        <a
          class="nav-link"
          id="bucket-sharing-tab"
          data-toggle="tab"
          href="#bucket_sharing"
          role="tab"
          aria-controls="bucket_sharing"
          aria-selected="false"
        >
          Sharing
        </a>
      </li>
      <li class="nav-item">
        <a
          class="nav-link"
          id="billing-accounts-tab"
          data-toggle="tab"
          href="#billing_accounts"
          role="tab"
          aria-controls="billing_accounts"
          aria-selected="false"
        >
          Billing
        </a>
      </li>
    </ul>
  </div>
  <div class="card-body">
    <div class="tab-content">
      <div
        class="tab-pane fade show active"
        id="environments"
        role="tabpanel"
        aria-labelledby="environments-tab"
      >
        {% include "environment/_available_environments_list.html" %}
      </div>
       <div
        class="tab-pane fade"
        id="bucket_sharing"
        role="tabpanel"
        aria-labelledby="bucket-sharing-tab"
      >
        {% include "environment/_shared_buckets_list.html" %}
      </div>
      <div
        class="tab-pane fade"
        id="billing_accounts"
        role="tabpanel"
        aria-labelledby="billing-accounts-tab"
      >
        {% include "environment/_billing_accounts_list.html" %}
      </div>
    </div>
  </div>
</div>

<script>
    $(document).on('show.bs.modal', '.modal', function () {
      isModalOpen = true;
    });

    $(document).on('hidden.bs.modal', '.modal', function () {
      if (cardToRefresh !== "") {
        pollExecutionStatus(cardToRefresh);
      }

      cardToRefresh = "";
      isModalOpen = false;
    });

    // Live updates via polling (no websockets). While any workflow is in
    // progress, poll its status and refresh the cards when it finishes. This
    // partial is re-rendered (and this script re-run) on each refresh, so the
    // logic is wrapped in an IIFE to stay re-runnable, clears any previous
    // poller, and only (re)starts one while work is in flight — when nothing is
    // in progress we stop polling entirely (no load on the API/GCP).
    (function () {
      if (window.environmentStatusPoll) {
        clearInterval(window.environmentStatusPoll);
        window.environmentStatusPoll = null;
      }

      const inProgressExecutions = [
        {% for workflow in workflows %}"{{ workflow.execution_resource_name }}",{% endfor %}
      ];

      if (inProgressExecutions.length === 0) return;

      inProgressExecutions.forEach(pollExecutionStatus);
      window.environmentStatusPoll = setInterval(function () {
        if (isModalOpen) return;
        inProgressExecutions.forEach(pollExecutionStatus);
      }, {{ environment_poll_interval_ms|default:30000 }});
    })();
</script>
